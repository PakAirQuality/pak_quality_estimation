# Conda environment for reproducing the figures and the modelling pipeline.
# Usage: conda env create -f environment.yml && conda activate paqi-pm25
#
# Geospatial packages (rasterio, geopandas, cartopy) are easier to install via
# conda-forge than pip because of their compiled GDAL/PROJ/GEOS dependencies.
name: paqi-pm25
channels:
  - conda-forge
dependencies:
  - python>=3.10
  # modelling stack
  - lightgbm>=4.0
  - scikit-learn>=1.3
  - numpy>=1.24
  - pandas>=2.0
  # geospatial / raster
  - rasterio>=1.3
  - geopandas>=0.14
  - cartopy>=0.22
  - contextily>=1.4
  # figures
  - matplotlib>=3.7
  - pip
  - pip:
      - python-pptx>=0.6
